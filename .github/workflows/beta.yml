name: Beta Release

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute beta version and push tag
        id: version
        run: |
          # Latest stable tag (ignores beta/alpha/rc tags)
          LAST_STABLE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -vE 'beta|alpha|rc' | sort -V | tail -1)

          if [ -z "$LAST_STABLE" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log "$LAST_STABLE..HEAD" --pretty=format:"%s")
          fi

          # Determine bump type from commit messages
          BUMP="patch"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE "(BREAKING CHANGE|^.+!:)"; then
              BUMP="major"; break
            elif echo "$msg" | grep -qE "^feat(\(.+\))?:"; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            fi
          done <<< "$COMMITS"

          # Compute next stable version from current package.json
          CURRENT=$(node -p "require('./package.json').version" | sed 's/-.*//')
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          if   [ "$BUMP" = "major" ]; then NEXT="$((MAJ+1)).0.0"
          elif [ "$BUMP" = "minor" ]; then NEXT="${MAJ}.$((MIN+1)).0"
          else                              NEXT="${MAJ}.${MIN}.$((PAT+1))"
          fi

          # Find the next available beta number for this version
          N=1
          while git tag | grep -qx "v${NEXT}-beta.${N}"; do N=$((N+1)); done

          VERSION="${NEXT}-beta.${N}"
          TAG="v${VERSION}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "Beta: $TAG (bump: $BUMP from $CURRENT)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  build-mac:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set version in package.json for build
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/certificate.p12

      - name: Build Mac (arm64 + x64)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-beta
          path: |
            release/*.dmg
            release/*.dmg.blockmap

  build-win:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set version in package.json for build
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: win-beta
          path: |
            release/*.exe
            release/*.exe.blockmap

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set version in package.json for build
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run dist:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-beta
          path: release/*.AppImage

  publish:
    needs: [version, build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release

      - name: Create prerelease on GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: release/*
          generate_release_notes: true
          prerelease: true
